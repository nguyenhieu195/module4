<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Return Success</title>
    <!-- UI Enhancement: Added modern font and shared CSS for consistent styling -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <!-- UI Enhancement: Wrapped content in container for modern card-like layout -->
    <div class="container">
        <h1>Return Successful</h1>
        <!-- UI Enhancement: Added success-message class for animated success notification -->
        <div class="success-message">
            <p th:text="${message}"></p>
        </div>
        <!-- UI Enhancement: Added btn-secondary class for consistent button styling -->
        <a href="/books" class="btn btn-secondary">Back to List</a>
    </div>
</body>
</html>
