<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Detail</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #ffe5e5, #ffffff);
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(255, 0, 0, 0.2);
            border: none;
        }

        .card-header {
            background: #dc3545;
            color: white;
            font-weight: bold;
            font-size: 20px;
            border-radius: 15px 15px 0 0;
        }

        .label {
            font-weight: bold;
            color: #dc3545;
        }

        .btn-back {
            background-color: #dc3545;
            color: white;
            transition: 0.3s;
        }

        .btn-back:hover {
            background-color: #a71d2a;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card">
                <div class="card-header text-center">
                    🔥 Product Detail
                </div>

                <div class="card-body">

                    <p><span class="label">ID:</span>
                        <span th:text="${product.id}"></span>
                    </p>

                    <p><span class="label">Name:</span>
                        <span th:text="${product.name}"></span>
                    </p>

                    <p><span class="label">Price:</span>
                        <span th:text="${product.price}"></span> $
                    </p>

                    <p><span class="label">Description:</span>
                        <span th:text="${product.description}"></span>
                    </p>

                    <p><span class="label">Manufacturer:</span>
                        <span th:text="${product.manufacturer}"></span>
                    </p>

                    <div class="text-center mt-4">
                        <a href="/products" class="btn btn-back px-4">
                            ⬅ Back
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        document.querySelector(".card").style.opacity = 0;
        setTimeout(() => {
            document.querySelector(".card").style.transition = "0.8s";
            document.querySelector(".card").style.opacity = 1;
        }, 100);
    });
</script>

</body>
</html>
