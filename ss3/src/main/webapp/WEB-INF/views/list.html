<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #ffe5e5, #ffffff);
            font-family: 'Segoe UI', sans-serif;
        }

        .title {
            color: #dc3545;
            font-weight: bold;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(255, 0, 0, 0.2);
            border: none;
        }

        .btn-red {
            background-color: #dc3545;
            color: white;
            transition: 0.3s;
        }

        .btn-red:hover {
            background-color: #a71d2a;
            transform: scale(1.05);
        }

        table th {
            background-color: #dc3545;
            color: white;
            text-align: center;
        }

        table td {
            vertical-align: middle;
            text-align: center;
        }

        .table-hover tbody tr:hover {
            background-color: #ffe5e5;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center title mb-4">🔥 Product List</h2>
    <div class="d-flex justify-content-between mb-3">

        <form action="/products/search" class="d-flex">
            <input type="text" name="keyword" class="form-control me-2" placeholder="Search product...">
            <button type="submit" class="btn btn-red">Search</button>
        </form>

        <a href="/products/create" class="btn btn-red">+ Add New</a>
    </div>

    <div class="card p-3">
        <table class="table table-bordered table-hover">
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price ($)</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="p : ${products}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.name}"></td>
                <td th:text="${p.price}"></td>
                <td>
                    <a th:href="@{/products/view/{id}(id=${p.id})}" class="btn btn-sm btn-outline-primary">View</a>
                    <a th:href="@{/products/edit/{id}(id=${p.id})}" class="btn btn-sm btn-warning">Edit</a>
                    <a th:href="@{/products/delete/{id}(id=${p.id})}"
                       class="btn btn-sm btn-danger btn-delete">Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.querySelectorAll(".btn-delete").forEach(btn => {
        btn.addEventListener("click", function (e) {
            if (!confirm("Bạn có chắc muốn xóa sản phẩm này không?")) {
                e.preventDefault();
            }
        });
    });

    document.addEventListener("DOMContentLoaded", function () {
        document.querySelector(".card").style.opacity = 0;
        setTimeout(() => {
            document.querySelector(".card").style.transition = "0.6s";
            document.querySelector(".card").style.opacity = 1;
        }, 100);
    });
</script>

</body>
</html>
