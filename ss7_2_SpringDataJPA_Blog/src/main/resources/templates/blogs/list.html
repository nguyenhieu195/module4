<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Blog Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-pink-100 to-pink-200 min-h-screen">

<div class="flex max-w-7xl mx-auto py-6 gap-6">

    <!-- 🔥 FILTER SIDEBAR -->
    <div class="w-1/4 bg-white rounded-2xl shadow-lg p-6 h-fit">

        <h2 class="text-xl font-semibold text-pink-600 mb-6">🎯 Filter</h2>

        <form action="/blogs/filter" method="get" class="space-y-5">

            <!-- Category -->
            <div>
                <label class="block text-sm mb-1 font-medium">Category</label>
                <select name="category"
                        class="w-full border border-pink-200 rounded-xl p-2">

                    <option value="">All</option>
                    <option value="Tech" th:selected="${category == 'Tech'}">Tech</option>
                    <option value="Life" th:selected="${category == 'Life'}">Life</option>
                    <option value="Education" th:selected="${category == 'Education'}">Education</option>

                </select>
            </div>

            <!-- Author -->
            <div>
                <label class="block text-sm mb-1 font-medium">Author</label>
                <select name="author"
                        class="w-full border border-pink-200 rounded-xl p-2">

                    <option value="">All</option>
                    <option value="Hiếu" th:selected="${author == 'Hiếu'}">Hiếu</option>
                    <option value="Admin" th:selected="${author == 'Admin'}">Admin</option>

                </select>
            </div>

            <button class="w-full bg-pink-500 text-white py-2 rounded-xl hover:bg-pink-600">
                Apply Filter
            </button>

        </form>
    </div>

    <!-- 🔥 MAIN CONTENT -->
    <div class="w-3/4">

        <!-- HEADER -->
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-semibold text-pink-600">📚 Blog Dashboard</h1>

            <a href="/blogs/create"
               class="bg-pink-500 text-white px-4 py-2 rounded-xl shadow hover:bg-pink-600">
                ➕ Create
            </a>
        </div>

        <!-- 🔥 SEARCH -->
        <form action="/blogs/search" method="get"
              class="mb-6 flex gap-3 bg-white p-4 rounded-2xl shadow">

            <input type="text"
                   name="key"
                   th:value="${key}"
                   placeholder="🔍 Search blog..."
                   class="flex-1 border border-pink-200 rounded-xl px-4 py-2"/>

            <!-- giữ filter khi search -->
            <input type="hidden" name="category" th:value="${category}">
            <input type="hidden" name="author" th:value="${author}">

            <button class="bg-pink-500 text-white px-5 rounded-xl hover:bg-pink-600">
                Search
            </button>
        </form>

        <!-- 🔥 TABLE -->
        <div class="bg-white rounded-2xl shadow overflow-hidden">

            <table class="w-full text-left">
                <thead class="bg-pink-100 text-pink-600 text-sm uppercase">
                <tr>
                    <th class="p-4">ID</th>
                    <th class="p-4">Title</th>
                    <th class="p-4">Author</th>
                    <th class="p-4">Category</th>
                    <th class="p-4">Created</th>
                    <th class="p-4 text-center">Actions</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="blog, status : ${blogs.content}"
                    class="border-b hover:bg-pink-50">

                    <td class="p-4" th:text="${blogs.number * blogs.size + status.index + 1}"></td>

                    <td class="p-4 font-medium"
                        th:text="${blog.title}"></td>

                    <td class="p-4" th:text="${blog.author}"></td>

                    <td class="p-4">
                        <span class="bg-pink-100 text-pink-600 px-2 py-1 rounded text-xs"
                              th:text="${blog.category}"></span>
                    </td>

                    <td class="p-4 text-sm text-gray-500"
                        th:text="${blog.createdAt != null ? #temporals.format(blog.createdAt, 'dd-MM-yyyy HH:mm') : ''}">
                    </td>

                    <td class="p-4 text-center space-x-2">

                        <a th:href="@{/blogs/detail(id=${blog.id})}"
                           class="text-blue-500 hover:underline">👁</a>

                        <a th:href="@{/blogs/delete(id=${blog.id})}"
                           onclick="return confirm('Are you sure?')"
                           class="text-red-500 hover:underline">🗑</a>

                    </td>
                </tr>
                </tbody>
            </table>

        </div>

        <!-- 🔥 PAGINATION (FIX FULL) -->
        <div class="mt-6 flex justify-center items-center gap-4">

            <a th:if="${blogs.hasPrevious()}"
               th:href="@{/blogs/list(page=${blogs.number - 1}, key=${key}, category=${category}, author=${author})}"
               class="px-4 py-2 bg-white rounded-xl shadow">
                ← Prev
            </a>

            <span class="font-medium text-gray-700">
                Page <span th:text="${blogs.number + 1}"></span> /
                <span th:text="${blogs.totalPages}"></span>
            </span>

            <a th:if="${blogs.hasNext()}"
               th:href="@{/blogs/list(page=${blogs.number + 1}, key=${key}, category=${category}, author=${author})}"
               class="px-4 py-2 bg-white rounded-xl shadow">
                Next →
            </a>

        </div>

    </div>
</div>

</body>
</html>
