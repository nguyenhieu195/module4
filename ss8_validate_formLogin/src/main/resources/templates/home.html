<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #e8f5e9; /* xanh lá nhạt */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            background-color: #43a047;
            color: white;
            font-weight: bold;
            border-radius: 15px 15px 0 0;
            text-align: center;
        }

        .card-body ul li {
            padding: 6px 0;
            transition: background-color 0.3s, transform 0.2s;
        }

        .card-body ul li:hover {
            background-color: #c8e6c9;
            transform: translateX(5px);
            border-radius: 5px;
        }

        a.btn-register {
            display: inline-block;
            margin-top: 15px;
            background-color: #43a047;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s;
        }

        a.btn-register:hover {
            background-color: #2e7d32;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.25);
        }

        h2, h3, h4 {
            color: #2e7d32;
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <div class="card-header">
                    🎉 Registration Successful!
                </div>
                <div class="card-body">
                    <!-- Kiểm tra có user hay không -->
                    <div th:if="${user != null}">
                        <h3 class="mt-3">Welcome, <span th:text="${user.firstName}">Name</span>!</h3>

                        <h4 class="mt-3">Your Information:</h4>
                        <ul>
                            <li>First Name: <span th:text="${user.firstName}"></span></li>
                            <li>Last Name: <span th:text="${user.lastName}"></span></li>
                            <li>Email: <span th:text="${user.email}"></span></li>
                            <li>Phone: <span th:text="${user.phoneNumber}"></span></li>
                            <li>Age: <span th:text="${user.age}"></span></li>
                            <li>Username: <span th:text="${user.username}"></span></li>
                        </ul>
                    </div>

                    <!-- Trường hợp không có user (vd: reload trang) -->
                    <div th:if="${user == null}">
                        <p class="text-danger">No user information found!</p>
                    </div>

                    <a href="/add" class="btn-register">➕ Register another user</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
