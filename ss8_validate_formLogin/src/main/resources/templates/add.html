<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Background */
        body {
            background-color: #e8f5e9; /* xanh lá nhạt */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Card form */
        .card {
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }

        /* Form title */
        .form-title {
            color: #2e7d32; /* xanh lá đậm */
            font-weight: bold;
        }

        /* Input focus */
        .form-control:focus {
            border-color: #43a047;
            box-shadow: 0 0 8px rgba(67, 160, 71, 0.3);
        }

        /* Button */
        .btn-primary {
            background-color: #43a047;
            border-color: #43a047;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background-color: #2e7d32;
            border-color: #2e7d32;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.25);
        }

        /* Error text */
        .text-danger {
            font-size: 0.9em;
            font-style: italic;
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4 text-center form-title">Đăng ký User</h2>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <form th:action="@{/save-user}" th:object="${user}" method="post">

                    <!-- Firstname -->
                    <div class="mb-3">
                        <label for="firstName" class="form-label">Firstname</label>
                        <input type="text" th:field="*{firstName}" class="form-control" id="firstName" placeholder="Nhập firstname">
                        <div class="text-danger" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                    </div>

                    <!-- Lastname -->
                    <div class="mb-3">
                        <label for="lastName" class="form-label">Lastname</label>
                        <input type="text" th:field="*{lastName}" class="form-control" id="lastName" placeholder="Nhập lastname">
                        <div class="text-danger" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                    </div>

                    <!-- Phone -->
                    <div class="mb-3">
                        <label for="phoneNumber" class="form-label">Phone</label>
                        <input type="text" th:field="*{phoneNumber}" class="form-control" id="phoneNumber" placeholder="Nhập số điện thoại">
                        <div class="text-danger" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
                    </div>

                    <!-- Age -->
                    <div class="mb-3">
                        <label for="age" class="form-label">Age</label>
                        <input type="number" th:field="*{age}" class="form-control" id="age" placeholder="Nhập tuổi">
                        <div class="text-danger" th:if="${#fields.hasErrors('age')}" th:errors="*{age}"></div>
                    </div>

                    <!-- Email -->
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" th:field="*{email}" class="form-control" id="email" placeholder="Nhập email">
                        <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>

                    <!-- Username -->
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" th:field="*{username}" class="form-control" id="username" placeholder="Nhập username">
                        <div class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                    </div>

                    <!-- Password -->
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" th:field="*{password}" class="form-control" id="password" placeholder="Nhập password">
                        <div class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Đăng ký</button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
