<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Blog</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }

        /* Background animation */
        body {
            background: linear-gradient(-45deg, #ffe4e6, #fbcfe8, #f9a8d4, #fda4af);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Hover nổi */
        .hover-lift {
            transition: all 0.3s ease;
        }

        .hover-lift:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 10px 25px rgba(255, 105, 180, 0.3);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center">

<div class="max-w-2xl w-full p-6">

    <div class="bg-white/80 backdrop-blur-lg shadow-2xl rounded-3xl p-8 animate-fade-in">

        <h2 class="text-2xl font-bold text-pink-600 mb-6">
            ➕ Create Blog
        </h2>

        <form action="/blogs/create" th:object="${blog}" method="post" class="space-y-4">

            <input type="text" th:field="*{title}" placeholder="Title"
                   class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-pink-400 outline-none hover-lift">

            <textarea th:field="*{content}" rows="4" placeholder="Content"
                      class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-pink-400 outline-none hover-lift"></textarea>

            <input type="text" th:field="*{author}" placeholder="Author"
                   class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-pink-400 outline-none hover-lift">

            <input type="text" th:field="*{category}" placeholder="Category"
                   class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-pink-400 outline-none hover-lift">

            <textarea th:field="*{summary}" placeholder="Summary"
                      class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-pink-400 outline-none hover-lift"></textarea>

            <input type="datetime-local" th:field="*{createdAt}"
                   class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-pink-400 outline-none hover-lift">

            <button type="submit"
                    class="w-full bg-pink-500 text-white py-3 rounded-xl shadow-lg hover-lift">
                💾 Save Blog
            </button>

        </form>

        <a href="/blogs"
           class="inline-block mt-4 text-pink-600 hover:underline">
            ⬅ Back
        </a>

    </div>

</div>

</body>
</html>
