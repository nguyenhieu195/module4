<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Blog Detail</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }

        body {
            background: linear-gradient(-45deg, #ffe4e6, #fbcfe8, #f9a8d4, #fda4af);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hover-lift {
            transition: 0.3s;
        }

        .hover-lift:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(255, 105, 180, 0.3);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center">

<div class="max-w-3xl w-full p-6">

    <div class="bg-white/80 backdrop-blur-lg rounded-3xl shadow-2xl p-8">

        <h2 class="text-2xl font-bold text-pink-600 mb-4">📖 Blog Detail</h2>

        <div class="space-y-3 text-gray-700">

            <p><strong>ID:</strong> <span th:text="${blog.id}"></span></p>

            <p><strong>Title:</strong>
                <span class="text-lg font-semibold text-gray-900"
                      th:text="${blog.title}"></span>
            </p>

            <p><strong>Author:</strong> <span th:text="${blog.author}"></span></p>

            <p><strong>Category:</strong>
                <span class="bg-pink-100 text-pink-600 px-2 py-1 rounded-lg text-sm"
                      th:text="${blog.category}"></span>
            </p>

            <hr class="my-4">

            <p class="font-semibold text-gray-800">Summary:</p>
            <p class="text-gray-600 leading-relaxed break-words whitespace-pre-line"
               th:text="${blog.summary}"></p>

            <p class="font-semibold text-gray-800 mt-4">Content:</p>
            <p class="text-gray-600 leading-relaxed break-words whitespace-pre-line"
               th:text="${blog.content}"></p>

        </div>

        <a href="/blogs"
           class="inline-block mt-6 bg-pink-500 text-white px-5 py-2 rounded-xl shadow-lg hover-lift">
            ⬅ Back
        </a>

    </div>

</div>

</body>
</html>
