<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Blog List</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }

        body {
            background: linear-gradient(-45deg, #ffe4e6, #fbcfe8, #f9a8d4, #fda4af);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hover-lift {
            transition: 0.3s;
        }

        .hover-lift:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(255, 105, 180, 0.3);
        }
    </style>
</head>

<body class="min-h-screen">

<header class="bg-white/80 backdrop-blur-lg shadow-md">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-semibold text-pink-600">📚 Blog Dashboard</h1>
        <a href="/blogs/create"
           class="bg-pink-500 text-white px-4 py-2 rounded-xl shadow-lg hover-lift">
            ➕ Create
        </a>
    </div>
</header>

<div class="max-w-7xl mx-auto p-6">
    <form action="/blogs/search" method="get"
          class="mb-6 flex items-center gap-3 bg-white/80 backdrop-blur-lg p-4 rounded-2xl shadow-lg">

        <input type="text" name="key"
               placeholder="🔍 Search by title, author, content..."
               class="flex-1 px-4 py-2 rounded-xl border border-pink-200 focus:outline-none focus:ring-2 focus:ring-pink-400 transition"/>

        <button type="submit"
                class="bg-pink-500 text-white px-5 py-2 rounded-xl shadow-md hover:bg-pink-600 hover-lift transition">
            🔎 Search
        </button>

    </form>
    <div class="bg-white/80 backdrop-blur-lg rounded-2xl shadow-xl overflow-hidden">
        <table class="w-full text-left">

            <thead class="bg-pink-100 text-pink-600 text-sm uppercase">
            <tr>
                <th class="p-4">ID</th>
                <th class="p-4">Title</th>
                <th class="p-4">Author</th>
                <th class="p-4">Category</th>
                <th class="p-4">Created</th>
                <th class="p-4 text-center">Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="blog : ${blogs}"
                class="border-b hover:bg-pink-50 transition">

                <td class="p-4" th:text="${blog.id}"></td>

                <td class="p-4 font-medium text-gray-800"
                    th:text="${blog.title}"></td>

                <td class="p-4" th:text="${blog.author}"></td>

                <td class="p-4">
                    <span class="bg-pink-100 text-pink-600 px-2 py-1 rounded-lg text-xs"
                          th:text="${blog.category}">
                    </span>
                </td>

                <td class="p-4 text-sm text-gray-500"
                    th:text="${blog.createdAt != null ? #temporals.format(blog.createdAt, 'dd-MM-yyyy HH:mm') : ''}">
                </td>

                <td class="p-4 text-center space-x-2">

                    <a th:href="@{/blogs/detail(id=${blog.id})}"
                       class="text-pink-500 hover:text-pink-700 hover-lift inline-block">
                        👁
                    </a>

                    <a th:href="@{/blogs/delete(id=${blog.id})}"
                       onclick="return confirm('Are you sure?')"
                       class="text-red-400 hover:text-red-600 hover-lift inline-block">
                        🗑
                    </a>

                </td>
            </tr>
            </tbody>

        </table>
    </div>

</div>
</body>
</html>
